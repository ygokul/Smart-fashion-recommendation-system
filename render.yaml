services:
  - type: web
    name: smart-fashion-app
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && mkdir -p static && python -c "from app.data import load_all_data; load_all_data()"
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
