services:
  # Single Web Service: Backend API + Frontend Static
  - type: web
    name: smart-fashion-app
    env: docker  # Flexible for bash script
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: uai-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: uai-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: uai-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: uai-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: uai-db
          property: databaseName
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false

databases:
  - name: uai-db
    databaseName: uai_chat_db
    user: uai_user
