services:
  - type: web
    name: smart-fashion-app
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt && mkdir -p generated_images static && python -c "from app.data import load_all_data; load_all_data() || echo 'Data load optional'"
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DEPLOY_ENV
        value: render
      - key: USE_MOCK_LLM
        value: true
      - key: MOCK_MODE
        value: true
