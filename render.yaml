services:
  - type: web
    name: smart-fashion-app
    env: python
    buildCommand: pip install -r backend/requirements-render.txt && cd frontend && npm ci && npm run build && cd .. && mkdir -p backend/generated_images backend/data
    startCommand: cd backend && python -m uvicorn app.main_render:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: JSON_STATE_PATH
        value: /opt/render/project/src/backend/data/render_state.json
