services:
  - type: web
    name: smart-fashion-app
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt && mkdir -p generated_images static
    startCommand: python -m uvicorn app.main_render:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DEPLOY_ENV
        value: render
      - key: USE_MOCK_LLM
        value: true
      - key: MOCK_MODE
        value: true
